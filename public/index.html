<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>量化交易控制台</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 登录界面 -->
    <div id="login-container" class="login-wrapper">
        <div class="login-box">
            <h2 style="text-align: center; margin-top: 0;">登录控制台</h2>
            <input type="text" id="login-user" placeholder="用户名" autocomplete="off">
            <input type="password" id="login-pass" placeholder="密码" autocomplete="off">
            <button id="login-submit" class="primary" style="margin-top: 10px; padding: 10px;">登录</button>
            <div id="login-error" class="error-text"></div>
        </div>
    </div>

    <!-- 主界面 -->
    <div class="container" id="main-container" style="display: none;">
        <header>
            <h1>📊 交易策略控制台</h1>
            <div style="display: flex; align-items: center; gap: 15px;">
                <div id="admin-controls" style="display: none; align-items: center; gap: 10px;">
                    <span style="color: #4caf50; font-size: 0.9em; font-weight: bold;">[管理员]</span>
                    <select id="user-select" style="padding: 4px; border-radius: 4px; background: #333; color: white; border: 1px solid #555;">
                        <option value="">加载中...</option>
                    </select>
                </div>
                <div id="user-info" style="font-size: 0.9em; color: #aaa;"></div>
                <button id="logout-btn" class="small danger" style="padding: 4px 8px;">登出</button>
            </div>
        </header>

        <section class="global-controls">
            <div class="control-group">
                <label>全局开仓倍数:</label>
                <input type="number" id="global-multiplier" step="0.1" min="0.1">
                <button class="primary" id="save-multiplier">保存</button>
            </div>
            
            <div class="control-group" style="margin-left: auto;">
                <button id="enable-all">全部启用</button>
                <button id="disable-all">全部禁用</button>
                <button id="reset-all-shorts">重置所有空信号</button>
            </div>
        </section>

        <section class="grid" id="cards-container">
            <!-- Cards will be injected here -->
            <div style="color: #aaa; grid-column: 1/-1; text-align: center; padding: 50px;">
                加载中...
            </div>
        </section>
    </div>

    <div class="loading-overlay" id="loading-overlay">
        <div class="spinner"></div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
